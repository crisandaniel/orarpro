<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0f172a;
    font-family: 'Georgia', serif;
    position: relative;
  }

  /* Grid background */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(37,99,235,0.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(37,99,235,0.12) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Glow */
  .glow {
    position: absolute;
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(37,99,235,0.25) 0%, transparent 70%);
    top: -80px;
    left: -100px;
  }
  .glow2 {
    position: absolute;
    width: 400px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(99,102,241,0.15) 0%, transparent 70%);
    bottom: -60px;
    right: 100px;
  }

  /* Mini timetable decoration */
  .timetable {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    display: grid;
    grid-template-columns: repeat(5, 48px);
    grid-template-rows: repeat(6, 36px);
    gap: 4px;
    opacity: 0.7;
  }
  .cell {
    border-radius: 6px;
    background: rgba(37,99,235,0.15);
    border: 0.5px solid rgba(37,99,235,0.3);
  }
  .cell.filled { background: rgba(37,99,235,0.45); border-color: rgba(37,99,235,0.7); }
  .cell.filled2 { background: rgba(99,102,241,0.45); border-color: rgba(99,102,241,0.7); }
  .cell.filled3 { background: rgba(5,150,105,0.45); border-color: rgba(5,150,105,0.7); }
  .cell.filled4 { background: rgba(217,119,6,0.45); border-color: rgba(217,119,6,0.7); }

  /* Content */
  .content {
    position: absolute;
    left: 72px;
    top: 50%;
    transform: translateY(-50%);
    max-width: 620px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(37,99,235,0.15);
    border: 0.5px solid rgba(37,99,235,0.4);
    border-radius: 20px;
    padding: 5px 14px;
    margin-bottom: 24px;
  }
  .badge-dot {
    width: 7px; height: 7px;
    background: #2563eb;
    border-radius: 50%;
  }
  .badge span {
    font-size: 13px;
    color: #93bbfd;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
  }

  h1 {
    font-size: 72px;
    font-weight: 700;
    line-height: 1.05;
    color: #fff;
    letter-spacing: -2px;
    margin-bottom: 20px;
  }
  h1 em {
    font-style: normal;
    color: #2563eb;
  }

  .sub {
    font-size: 22px;
    color: #94a3b8;
    line-height: 1.5;
    font-family: 'Georgia', serif;
    font-style: italic;
    margin-bottom: 36px;
  }

  .features {
    display: flex;
    gap: 20px;
  }
  .feature {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #64748b;
    font-family: 'Courier New', monospace;
  }
  .feature-dot {
    width: 5px; height: 5px;
    background: #2563eb;
    border-radius: 50%;
  }

  .domain {
    position: absolute;
    bottom: 36px;
    left: 72px;
    font-size: 16px;
    color: #334155;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="glow2"></div>

  <!-- Mini timetable -->
  <div class="timetable">
    <div class="cell filled"></div><div class="cell"></div><div class="cell filled2"></div><div class="cell"></div><div class="cell filled3"></div>
    <div class="cell"></div><div class="cell filled3"></div><div class="cell"></div><div class="cell filled"></div><div class="cell"></div>
    <div class="cell filled2"></div><div class="cell filled"></div><div class="cell"></div><div class="cell filled2"></div><div class="cell filled4"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell filled4"></div><div class="cell filled3"></div><div class="cell"></div>
    <div class="cell filled3"></div><div class="cell filled4"></div><div class="cell filled"></div><div class="cell"></div><div class="cell filled2"></div>
    <div class="cell filled4"></div><div class="cell"></div><div class="cell filled3"></div><div class="cell filled"></div><div class="cell"></div>
  </div>

  <div class="content">
    <div class="badge">
      <div class="badge-dot"></div>
      <span>CP-SAT Solver</span>
    </div>
    <h1>Orar <em>automat</em><br>pentru școli</h1>
    <p class="sub">Generator inteligent de orar — configurabil,<br>rapid și fără conflicte.</p>
    <div class="features">
      <div class="feature"><div class="feature-dot"></div>Profesori & clase</div>
      <div class="feature"><div class="feature-dot"></div>Constrângeri soft</div>
      <div class="feature"><div class="feature-dot"></div>Export PDF</div>
    </div>
  </div>

  <div class="domain">orarpro.ro</div>
</body>
</html>
